version: 2

models:
  - name: btc_daily_clean
    description: "Cleaned daily BTC OHLCV data."
    columns:
      - name: btc_date
        data_tests:
          - not_null
          - unique
      - name: close_price_usd
        data_tests:
          - not_null

  - name: btc_fear_greed_clean
    description: "Cleaned BTC fear and greed data."
    columns:
      - name: btc_date
        data_tests:
          - not_null
          - unique
      - name: fear_greed_label
        data_tests:
          - accepted_values:
              arguments:
                values: ['Extreme Fear', 'Fear', 'Neutral', 'Greed', 'Extreme Greed']

  - name: fct_btc_daily
    description: "Daily BTC analytics table combining price history and fear-greed sentiment."
    columns:
      - name: btc_date
        data_tests:
          - not_null
          - unique
      - name: record_updated_at
        data_tests:
          - not_null
      - name: fear_greed_label
        data_tests:
          - accepted_values:
              arguments:
                values: ['Extreme Fear', 'Fear', 'Neutral', 'Greed', 'Extreme Greed']

  - name: fct_btc_intraday_market
    description: "Realtime / intraday BTC market analytics model built from BTC realtime snapshots."
    columns:
      - name: fetched_at
        description: "Timestamp when the realtime market snapshot was collected."
        data_tests:
          - not_null
          - unique
      - name: snapshot_date
        description: "Date of the realtime market snapshot."
        data_tests:
          - not_null
      - name: close
        description: "BTC close price for the snapshot."
        data_tests:
          - not_null
      - name: record_updated_at
        description: "Timestamp used by dbt snapshots to track changes in the intraday market model."
        data_tests:
          - not_null
      - name: taker_buy_ratio
        description: "Ratio of taker buy volume to total BTC volume."

  - name: btc_forecast_vs_realtime
    description: "Short-term BTC forecast compared against realtime observed market snapshots."
    columns:
      - name: prediction_date
        description: "Date being forecasted."
        data_tests:
          - not_null
          - unique
      - name: predicted_close
        description: "Predicted BTC close price using a 7-day average return baseline forecast."
        data_tests:
          - not_null
      - name: model_name
        description: "Name of the forecasting method."
        data_tests:
          - not_null
      - name: record_updated_at
        description: "Timestamp used by dbt snapshots to track forecast row changes over time."
        data_tests:
          - not_null
